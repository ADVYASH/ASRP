<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASRP 3 Whitelist</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
width:500px;
margin:auto;
margin-top:50px;
background:#1e293b;
padding:30px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
padding:12px;
width:100%;
background:#22c55e;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.login-btn{
background:#5865F2;
}
</style>

</head>

<body>

<div class="container">

<h1>ASRP 3 SMP Whitelist</h1>

<button class="login-btn" onclick="loginDiscord()">
Login with Discord
</button>

<form id="form" style="display:none">

<input id="mcname" placeholder="Minecraft Username" required>

<input id="age" placeholder="Age" required>

<input id="country" placeholder="Country / Timezone">

<select id="activity">
<option>1-2 hours daily</option>
<option>Weekends</option>
<option>Very Active</option>
</select>

<textarea id="why" placeholder="Why do you want to join?" required></textarea>

<textarea id="experience" placeholder="SMP Experience"></textarea>

<select id="type">
<option>Builder</option>
<option>Redstone</option>
<option>PvP</option>
<option>Explorer</option>
<option>Farmer</option>
</select>

<button type="submit">Submit Application</button>

</form>

</div>

<script>

const CLIENT_ID = "YOUR_CLIENT_ID"
const REDIRECT = https://advyash.github.io/ASRP
const WEBHOOK = "https://discord.com/api/webhooks/1481369069834997912/0UcEa3viJP60aEV-PUdWRC_Zel9lUXZjF42Mmzf1YJ3VuRNUzmzaM-B-6OQfPjkS6br1"

let discordUser = null

function loginDiscord(){

window.location.href =
`https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT}&response_type=token&scope=identify`

}

if(window.location.hash){

const params = new URLSearchParams(window.location.hash.substring(1))
const token = params.get("access_token")

fetch("https://discord.com/api/users/@me",{
headers:{
authorization:`Bearer ${token}`
}
})
.then(res=>res.json())
.then(user=>{

discordUser = user

document.querySelector(".login-btn").style.display="none"
document.getElementById("form").style.display="block"

})

}

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault()

const data = {

content:`<@${discordUser.id}> submitted a whitelist application`,

embeds:[
{
title:"ASRP 3 Whitelist Application",
color:5763719,

fields:[

{name:"Discord",value:`${discordUser.username}#${discordUser.discriminator}`},

{name:"User ID",value:discordUser.id},

{name:"Minecraft Username",value:document.getElementById("mcname").value},

{name:"Age",value:document.getElementById("age").value},

{name:"Country",value:document.getElementById("country").value},

{name:"Activity",value:document.getElementById("activity").value},

{name:"Why Join",value:document.getElementById("why").value},

{name:"Experience",value:document.getElementById("experience").value},

{name:"Player Type",value:document.getElementById("type").value}

]

}
]

}

fetch(WEBHOOK,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

alert("Application Sent!")

})

</script>

</body>
</html>
